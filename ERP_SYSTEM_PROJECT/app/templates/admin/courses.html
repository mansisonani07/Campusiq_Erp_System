{% extends "base.html" %}
{% block content %}
<section class="panel">
    <h2>Course Management</h2>
    {% if can_manage %}
    <form method="post" action="/admin/courses" class="grid four">
        <input type="hidden" name="csrf_token" value="{{ csrf_token(request) }}">
        <label>Code<input name="code" required></label>
        <label>Title<input name="title" required></label>
        <label>Credits<input type="number" name="credits" required></label>
        <label>Semester<input name="semester" required></label>
        <button class="btn primary" type="submit">Add Course</button>
    </form>
    {% else %}
    <p class="muted">Read-only access for your role.</p>
    {% endif %}
</section>
<section class="panel">
    <table>
        <thead><tr><th>Code</th><th>Title</th><th>Credits</th><th>Semester</th></tr></thead>
        <tbody>
            {% for c in courses %}
            <tr><td>{{ c.code }}</td><td>{{ c.title }}</td><td>{{ c.credits }}</td><td>{{ c.semester }}</td></tr>
            {% endfor %}
        </tbody>
    </table>
</section>
{% endblock %}
