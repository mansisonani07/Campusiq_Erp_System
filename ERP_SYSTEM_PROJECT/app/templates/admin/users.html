{% extends "base.html" %}
{% block content %}
<section class="panel">
    <h2>User Role Management</h2>
    <p class="muted">Only admins can change role categories.</p>
    <table>
        <thead><tr><th>Name</th><th>Email</th><th>Current Role</th><th>Update Role</th></tr></thead>
        <tbody>
            {% for u in users %}
            <tr>
                <td>{{ u.name }}</td>
                <td>{{ u.email }}</td>
                <td>{{ u.role }}</td>
                <td>
                    <form method="post" action="/admin/users/{{ u.id }}/role" class="inline-form">
                        <input type="hidden" name="csrf_token" value="{{ csrf_token(request) }}">
                        <select name="role">
                            {% for r in roles %}
                            <option value="{{ r }}" {% if u.role == r %}selected{% endif %}>{{ r }}</option>
                            {% endfor %}
                            <option value="student" {% if u.role == 'student' %}selected{% endif %}>student</option>
                        </select>
                        <button class="btn-inline" type="submit">Save</button>
                    </form>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</section>
{% endblock %}
