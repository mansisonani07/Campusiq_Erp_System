{% extends "base.html" %}
{% block content %}
<section class="panel">
    <h2>Website Settings (Admin Controlled)</h2>
    <form method="post" action="/admin/settings" class="grid three">
        <input type="hidden" name="csrf_token" value="{{ csrf_token(request) }}">
        <label>Site Title<input name="site_title" value="{{ settings.get('site_title','') }}" required></label>
        <label>Site Subtitle<input name="site_subtitle" value="{{ settings.get('site_subtitle','') }}" required></label>
        <label>Homepage CTA<input name="hero_cta" value="{{ settings.get('hero_cta','') }}" required></label>
        <button class="btn primary" type="submit">Save Settings</button>
    </form>
</section>
{% endblock %}
