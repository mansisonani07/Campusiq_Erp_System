{% extends "base.html" %}
{% block content %}
<section class="login-page signup-page">
    <div class="login-bg signup-bg" aria-hidden="true">
        <div class="float-blob blob-a"></div>
        <div class="float-blob blob-b"></div>
        <div class="float-blob blob-c"></div>
        <div class="signup-orbit orbit-one"></div>
        <div class="signup-orbit orbit-two"></div>
        <div class="signup-orbit orbit-three"></div>
        <div class="signup-grid"></div>
    </div>
    <section class="panel login-panel register-panel">
        <h2 class="login-title">Create Account</h2>
        <p class="muted">Choose your role and complete your profile details.</p>
        {% if message %}<p class="success">{{ message }}</p>{% endif %}
        {% if error %}<p class="error">{{ error }}</p>{% endif %}
        <form id="register-form" method="post" action="/register" class="grid login-form register-form">
            <input type="hidden" name="csrf_token" value="{{ csrf_token(request) }}">
            <label>
                Role
                <select id="register_role" name="role" required>
                    {% for role_value, role_label in role_options %}
                    <option value="{{ role_value }}" {% if form_data.role == role_value %}selected{% endif %}>{{ role_label }}</option>
                    {% endfor %}
                </select>
            </label>
            <label>
                Full Name
                <input type="text" name="name" placeholder="Full name" value="{{ form_data.name }}" required>
            </label>
            <label>
                Email
                <input type="email" name="email" placeholder="Email address" value="{{ form_data.email }}" required>
            </label>
            <label class="student-only-field">
                Phone
                <input type="text" name="phone" placeholder="Phone number (10-15 digits)" inputmode="tel" value="{{ form_data.phone }}" required>
            </label>
            <label class="student-only-field">
                Roll Number
                <input type="text" name="roll_no" placeholder="Roll number" value="{{ form_data.roll_no }}" required>
            </label>
            <label class="student-only-field">
                Branch
                <select name="branch" required>
                    <option value="">Select Branch</option>
                    {% for value in branch_options %}
                    <option value="{{ value }}" {% if form_data.branch == value %}selected{% endif %}>{{ value }}</option>
                    {% endfor %}
                </select>
            </label>
            <label class="student-only-field">
                Department
                <select name="department" required>
                    <option value="">Select Department</option>
                    {% for value in department_options %}
                    <option value="{{ value }}" {% if form_data.department == value %}selected{% endif %}>{{ value }}</option>
                    {% endfor %}
                </select>
            </label>
            <label class="student-only-field">
                Year
                <input type="number" name="year" min="1" max="6" placeholder="Year (1-6)" value="{{ form_data.year }}" required>
            </label>
            <label class="student-only-field">
                Guardian Name (Optional)
                <input type="text" name="guardian_name" placeholder="Guardian name (optional)" value="{{ form_data.guardian_name }}">
            </label>
            <label>
                Password
                <div class="password-field">
                    <input id="register_password" type="password" name="password" placeholder="Password (upper/lower/number/symbol)" required autocomplete="new-password">
                    <span toggle="#register_password" class="field-icon toggle-password" role="button" tabindex="0" aria-label="Toggle password visibility">
                        <svg class="eye-icon eye-open" viewBox="0 0 24 24" aria-hidden="true" focusable="false"><path d="M1.5 12S5.5 5.5 12 5.5 22.5 12 22.5 12 18.5 18.5 12 18.5 1.5 12 1.5 12Z"></path><circle cx="12" cy="12" r="3.2"></circle></svg>
                        <svg class="eye-icon eye-closed" viewBox="0 0 24 24" aria-hidden="true" focusable="false"><path d="M3 3l18 18"></path><path d="M9.9 5.9A11.2 11.2 0 0 1 12 5.5c6.5 0 10.5 6.5 10.5 6.5a18.5 18.5 0 0 1-3.6 4.4"></path><path d="M6.7 6.7A19.2 19.2 0 0 0 1.5 12S5.5 18.5 12 18.5c1.7 0 3.2-.4 4.5-1.1"></path><path d="M10.6 10.6a2 2 0 0 0 2.8 2.8"></path></svg>
                    </span>
                </div>
            </label>
            <label>
                Confirm Password
                <div class="password-field">
                    <input id="register_confirm_password" type="password" name="confirm_password" placeholder="Confirm password" required autocomplete="new-password">
                    <span toggle="#register_confirm_password" class="field-icon toggle-password" role="button" tabindex="0" aria-label="Toggle password visibility">
                        <svg class="eye-icon eye-open" viewBox="0 0 24 24" aria-hidden="true" focusable="false"><path d="M1.5 12S5.5 5.5 12 5.5 22.5 12 22.5 12 18.5 18.5 12 18.5 1.5 12 1.5 12Z"></path><circle cx="12" cy="12" r="3.2"></circle></svg>
                        <svg class="eye-icon eye-closed" viewBox="0 0 24 24" aria-hidden="true" focusable="false"><path d="M3 3l18 18"></path><path d="M9.9 5.9A11.2 11.2 0 0 1 12 5.5c6.5 0 10.5 6.5 10.5 6.5a18.5 18.5 0 0 1-3.6 4.4"></path><path d="M6.7 6.7A19.2 19.2 0 0 0 1.5 12S5.5 18.5 12 18.5c1.7 0 3.2-.4 4.5-1.1"></path><path d="M10.6 10.6a2 2 0 0 0 2.8 2.8"></path></svg>
                    </span>
                </div>
            </label>
            <button class="btn primary register-submit" type="submit">Create Account</button>
        </form>
        <div class="auth-links">
            <a href="/login">Back to Login</a>
        </div>
    </section>
</section>
{% endblock %}
