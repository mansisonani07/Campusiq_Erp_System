<!DOCTYPE html>
<html>
<head>
    <title>{{ title }}</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .id-card {
            width: 350px;
            border: 2px solid #333;
            border-radius: 10px;
            padding: 20px;
            margin: 0 auto;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .id-card-header {
            text-align: center;
            border-bottom: 2px solid white;
            padding-bottom: 10px;
            margin-bottom: 15px;
        }
        .id-card-header h2 { margin: 0; font-size: 18px; }
        .id-card-header p { margin: 5px 0 0; font-size: 12px; }
        .photo-placeholder {
            width: 100px;
            height: 100px;
            background: white;
            border-radius: 50%;
            margin: 0 auto 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #333;
            font-size: 40px;
        }
        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid rgba(255,255,255,0.3);
        }
        .info-label { font-weight: bold; }
        .barcode {
            text-align: center;
            margin-top: 15px;
            padding: 10px;
            background: white;
            border-radius: 5px;
        }
        .barcode-text {
            font-family: 'Courier New', monospace;
            letter-spacing: 3px;
            color: black;
            font-weight: bold;
        }
        .print-btn {
            display: block;
            margin: 20px auto;
            padding: 10px 30px;
            background: #333;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }
        .print-btn:hover { background: #555; }
        @media print {
            .print-btn { display: none; }
            body { padding: 0; }
            .id-card { border: none; }
        }
    </style>
</head>
<body>
    <div class="id-card">
        <div class="id-card-header">
            <h2>CAMPUSIQ STUDENT ERP</h2>
            <p>Institute of Technology</p>
        </div>
        
        <div class="photo-placeholder">👤</div>
        
        <div class="info-row">
            <span class="info-label">Name:</span>
            <span>{{ student.name }}</span>
        </div>
        <div class="info-row">
            <span class="info-label">Roll No:</span>
            <span>{{ profile.roll_no }}</span>
        </div>
        <div class="info-row">
            <span class="info-label">Branch:</span>
            <span>{{ branch.name if branch else 'N/A' }}</span>
        </div>
        <div class="info-row">
            <span class="info-label">Semester:</span>
            <span>{{ semester.semester_number if semester else 'N/A' }}</span>
        </div>
        <div class="info-row">
            <span class="info-label">Academic Year:</span>
            <span>2025-26</span>
        </div>
        
        <div class="barcode">
            <div class="barcode-text">{{ profile.roll_no }}-2025</div>
        </div>
    </div>
    
    <button class="print-btn" onclick="window.print()">🖨️ Print ID Card</button>
</body>
</html>
