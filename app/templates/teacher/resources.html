<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Resource Library - CampusIQ</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body class="bg-gradient-to-br from-slate-900 via-slate-900 to-slate-950 font-['Inter'] antialiased min-h-screen">
  {% extends "teacher/base.html" %}
  {% block content %}
  <div class="ml-64 min-h-screen">
    <header class="bg-white/5 backdrop-blur-md border-b border-slate-700 sticky top-0 z-30 px-8 py-4">
      <div class="flex items-center justify-between">
        <div class="flex items-center space-x-4">
          <h1 class="text-3xl font-bold bg-gradient-to-r from-slate-100 to-slate-200 bg-clip-text text-transparent">Resource Library</h1>
          <div class="text-sm text-slate-400">Manage study materials for your students</div>
        </div>
        <button onclick="openUploadModal()" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-3 rounded-xl font-semibold text-sm shadow-lg hover:shadow-xl transition-all">
          + Upload Material
        </button>
      </div>
    </header>
    
    <main class="p-8">
      <!-- Upload Modal -->
      <div id="upload-modal" class="fixed inset-0 bg-black/50 z-50 hidden flex items-center justify-center p-4" onclick="closeUploadModal()">
        <div class="bg-slate-800 border border-slate-700 rounded-3xl p-8 w-full max-w-md max-h-[90vh] overflow-y-auto" onclick="event.stopPropagation()">
          <h2 class="text-2xl font-bold text-white mb-6">Upload Study Material</h2>
          <form id="upload-form" enctype="multipart/form-data">
            <div class="space-y-4">
              <input type="text" name="title" placeholder="Material Title" required class="w-full px-4 py-3 bg-slate-700/50 border border-slate-600 rounded-xl text-white focus:ring-2">
              <textarea name="description" placeholder="Description (optional)" rows="3" class="w-full px-4 py-3 bg-slate-700/50 border border-slate-600 rounded-xl text-white focus:ring-2"></textarea>
              <input type="file" name="file" accept=".pdf,.doc,.docx,.ppt,.pptx" required class="w-full px-4 py-3 bg-slate-700/50 border border-slate-600 rounded-xl text-white file:mr-4 file:py-2 file:px-4 file:rounded-lg file:border-0 file:bg-blue-600 file:text-blue-200">
              <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white py-3 px-6 rounded-xl font-semibold transition-all">Upload</button>
            </div>
          </form>
        </div>
      </div>

      <div class="bg-slate-800/50 backdrop-blur-sm border border-slate-700 rounded-3xl p-6 mb-8">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
          <div class="md:col-span-2">
            <input type="text" id="search" placeholder="Search materials..." class="w-full pl-12 pr-4 py-3 bg-slate-700/50 border border-slate-700 rounded-xl text-white focus:ring-2">
          </div>
          <div class="text-center">
            <div class="text-2xl font-bold text-white">12</div>
            <div class="text-sm text-slate-400">Total Files</div>
          </div>
        </div>
      </div>

      <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
        <div class="group bg-slate-800/50 border border-slate-700 rounded-3xl p-6 hover:border-slate-600 hover:shadow-2xl transition-all h-64">
          <div class="flex items-center mb-4">
            <div class="w-12 h-12 bg-gradient-to-br from-blue-500 to-blue-600 rounded-2xl flex items-center justify-center">
              <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path>
              </svg>
            </div>
            <div class="ml-4">
              <h3 class="font-bold text-white text-lg mb-1">Data Structures Notes</h3>
              <p class="text-slate-400 text-sm">Sem 3 • PDF • 2.4 MB</p>
            </div>
          </div>
          <p class="text-slate-300 mb-6 line-clamp-3 leading-relaxed">Complete lecture notes covering arrays, linked lists...</p>
          <div class="flex items-center justify-between pt-4 border-t border-slate-700">
            <span class="px-3 py-1 bg-emerald-500/20 text-emerald-400 text-xs font-semibold rounded-full">Recent</span>
            <div class="flex space-x-2">
              <a href="#" class="p-2 hover:bg-slate-700 rounded-xl text-slate-400 hover:text-white">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path>
                </svg>
              </a>
              <button class="p-2 hover:bg-red-500/10 rounded-xl text-red-400 hover:text-red-300">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path>
                </svg>
              </button>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script>
    function openUploadModal() {
      document.getElementById('upload-modal').classList.remove('hidden');
    }
    function closeUploadModal() {
      document.getElementById('upload-modal').classList.add('hidden');
    }
    
    document.getElementById('upload-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const formData = new FormData(e.target);
      try {
        const response = await fetch('/teacher/study-materials', {
          method: 'POST',
          body: formData
        });
        if (response.ok) {
          closeUploadModal();
          location.reload();
        } else {
          alert('Upload failed');
        }
      } catch (error) {
        alert('Upload error');
      }
    });
  </script>
  {% endblock %}
</body>
</html>
