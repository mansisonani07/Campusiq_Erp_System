{% extends "base.html" %}
{% block content %}
<section class="login-page">
    <div class="login-bg" aria-hidden="true">
        <div class="float-blob blob-a"></div>
        <div class="float-blob blob-b"></div>
        <div class="float-blob blob-c"></div>
    </div>
    <section class="panel small login-panel">
        <h2 class="login-title">Update Email / Phone</h2>
        {% if message %}<p class="success">{{ message }}</p>{% endif %}
        {% if error %}<p class="error">{{ error }}</p>{% endif %}
        <form method="post" action="/update-contact" class="grid login-form">
            <input type="hidden" name="csrf_token" value="{{ csrf_token(request) }}">
            <input type="email" name="current_email" placeholder="Current account email" required>
            <input type="password" name="password" placeholder="Current password" required>
            <input type="email" name="new_email" placeholder="New email (optional)">
            <input type="text" name="new_phone" placeholder="New phone (optional)">
            <button class="btn primary" type="submit">Update Contact</button>
        </form>
        <div class="auth-links">
            <a href="/login">Back to Login</a>
        </div>
    </section>
</section>
{% endblock %}
