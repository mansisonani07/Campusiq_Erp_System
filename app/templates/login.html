<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - CampusIQ</title>
    <link rel="stylesheet" href="/static/css/styles.css">
    <link rel="icon" type="image/svg+xml" href="/static/icons/campusiq-icon.svg">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: radial-gradient(circle at top left, rgba(35, 110, 255, 0.15), transparent 25%),
                        radial-gradient(circle at bottom right, rgba(78, 110, 255, 0.1), transparent 22%),
                        #040817;
            color: #e4f3ff;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            overflow-x: hidden;
            min-height: 100vh;
            padding: 18px 0 18px;
        }
        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background: linear-gradient(120deg, rgba(23, 42, 80, 0.35), transparent 35%, rgba(9, 15, 32, 0.7));
            pointer-events: none;
            z-index: 0;
        }
        .particles {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
        }
        .particle {
            position: absolute;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: rgba(86, 196, 255, 0.22);
            box-shadow: 0 0 20px rgba(86, 196, 255, 0.28);
            opacity: 0.75;
            animation: drift 18s ease-in-out infinite;
        }
        .login-container {
            position: relative;
            z-index: 2;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px 12px 10px;
            min-height: calc(100vh - 28px);
            width: 100%;
        }
        .login-card {
            position: relative;
            background: rgba(8, 16, 34, 0.92);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 1.6rem;
            padding: 24px;
            width: 100%;
            max-width: 340px;
            max-height: calc(100vh - 36px);
            overflow: visible;
            backdrop-filter: blur(20px);
            box-shadow: 0 24px 70px rgba(0, 0, 0, 0.32);
            animation: fadeInUp 0.8s ease-out forwards;
        }
        .login-card::before {
            content: "";
            position: absolute;
            inset: 0;
            border-radius: 1.6rem;
            background: radial-gradient(circle at top left, rgba(77, 150, 255, 0.12), transparent 40%);
            pointer-events: none;
        }
        .login-logo {
            text-align: center;
            margin-bottom: 0.6rem;
            position: relative;
            z-index: 1;
        }
        .login-logo-text {
            font-size: 22px;
            font-weight: 700;
            color: #d9f1ff;
            letter-spacing: -0.04em;
            text-shadow: 0 0 18px rgba(101, 179, 255, 0.36);
        }
        .login-title {
            font-size: 20px;
            font-weight: 700;
            color: #ebf5ff;
            text-align: center;
            margin-bottom: 0.2rem;
            position: relative;
            z-index: 1;
        }
        .login-subtitle {
            color: #bfdcff;
            text-align: center;
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
            opacity: 0.92;
            position: relative;
            z-index: 1;
        }
        .form-group {
            margin-bottom: 10px;
            position: relative;
            z-index: 1;
        }
        .form-group label {
            display: block;
            font-weight: 600;
            color: #b8d7ff;
            margin-bottom: 0.4rem;
            font-size: 0.88rem;
        }
        .form-group input,
        .form-group select {
            width: 100%;
            height: 40px;
            padding: 0.5rem 1rem;
            background: rgba(15, 26, 52, 0.72);
            border: 1.5px solid rgba(88, 156, 255, 0.22);
            border-radius: 1rem;
            font-size: 0.92rem;
            color: #e4f3ff;
            font-family: inherit;
            transition: all 0.3s ease;
        }
        .form-group input::placeholder,
        .form-group select::placeholder {
            color: rgba(200, 220, 255, 0.5);
        }
        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: rgba(88, 202, 255, 0.6);
            background: rgba(15, 26, 52, 0.88);
            box-shadow: 0 0 16px rgba(88, 202, 255, 0.22);
        }
        .remember-wrap {
            display: flex;
            align-items: center;
            gap: 0.7rem;
            margin-bottom: 0.65rem;
            position: relative;
            z-index: 1;
            color: #bfdcff;
            font-size: 0.88rem;
            padding: 0.55rem 0.8rem;
            border-radius: 1rem;
            background: rgba(15, 26, 52, 0.65);
            border: 1px solid rgba(88, 156, 255, 0.18);
        }
        .remember-wrap input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: #4f95ff;
            border-radius: 4px;
            background: rgba(255, 255, 255, 0.05);
        }
        .greeting-text {
            color: #c8e1ff;
            font-size: 0.92rem;
            text-align: center;
            margin-bottom: 0.3rem;
            opacity: 0.96;
        }
        .role-badge {
            display: none;
            align-items: center;
            justify-content: center;
            gap: 0.45rem;
            padding: 0.55rem 0.75rem;
            margin: 0.4rem 0 0.3rem;
            border-radius: 1rem;
            background: rgba(12, 24, 56, 0.9);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: #e4f3ff;
            font-size: 0.9rem;
            font-weight: 600;
            text-align: center;
            box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.04);
        }
        .role-badge.visible {
            display: inline-flex;
        }
        .role-badge .role-icon {
            font-size: 1.05rem;
        }
        .login-card.admin-glow {
            border-color: rgba(79, 149, 255, 0.8);
            box-shadow: 0 0 40px rgba(79, 149, 255, 0.22);
        }
        .login-card.teacher-glow {
            border-color: rgba(52, 210, 127, 0.75);
            box-shadow: 0 0 40px rgba(52, 210, 127, 0.2);
        }
        .login-card.student-glow {
            border-color: rgba(162, 108, 255, 0.8);
            box-shadow: 0 0 40px rgba(162, 108, 255, 0.24);
        }
        .login-btn {
            width: 100%;
            padding: 0.95rem;
            background: linear-gradient(135deg, #4f95ff 0%, #62c0ff 100%);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.18);
            border-radius: 999px;
            font-size: 0.95rem;
            font-weight: 700;
            cursor: pointer;
            margin-top: 0.4rem;
            transition: transform 0.3s ease, box-shadow 0.3s ease, background 0.3s ease;
            animation: pulseBtn 2.4s ease-in-out infinite;
            position: relative;
            z-index: 1;
            box-shadow: 0 12px 30px rgba(79, 149, 255, 0.2);
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 16px 48px rgba(79, 149, 255, 0.32);
        }
        .login-btn.loading {
            cursor: progress;
        }
        .login-btn .btn-loader {
            display: inline-block;
            width: 18px;
            height: 18px;
            margin-left: 0.75rem;
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-top-color: #ffffff;
            border-radius: 50%;
            opacity: 0;
            transform: scale(0.8);
            transition: opacity 0.15s ease, transform 0.15s ease;
        }
        .login-btn.loading .btn-loader {
            opacity: 1;
            transform: scale(1);
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .auth-links {
            display: flex;
            justify-content: space-between;
            margin-top: 0.4rem;
            padding-top: 0.65rem;
            border-top: 1px solid rgba(255, 255, 255, 0.08);
            position: relative;
            z-index: 1;
        }
        .auth-links a {
            color: #88b8ff;
            text-decoration: none;
            font-size: 0.88rem;
            transition: color 0.3s ease;
        }
        .auth-links a:hover {
            color: #b8d7ff;
            text-decoration: underline;
        }
        .back-link {
            display: block;
            text-align: center;
            margin-top: 0.4rem;
            font-size: 0.82rem;
            color: rgba(200, 220, 255, 0.76);
            text-decoration: none;
            transition: color 0.3s ease;
        }
        .back-link:hover {
            color: #d9f1ff;
            text-decoration: underline;
        }
        .success-msg {
            background: rgba(46, 125, 50, 0.16);
            color: #8cff8c;
            padding: 0.9rem;
            border: 1px solid rgba(46, 125, 50, 0.3);
            border-radius: 0.8rem;
            margin-bottom: 1rem;
            position: relative;
            z-index: 1;
        }
        .error-msg {
            background: rgba(198, 40, 40, 0.16);
            color: #ff8b8b;
            padding: 0.9rem;
            border: 1px solid rgba(198, 40, 40, 0.3);
            border-radius: 0.8rem;
            margin-bottom: 1rem;
            position: relative;
            z-index: 1;
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes drift {
            0%, 100% { transform: translate(0, 0) scale(0.94); opacity: 0.62; }
            50% { transform: translate(18px, -22px) scale(1.04); opacity: 1; }
        }
        @keyframes pulseBtn {
            0%, 100% { box-shadow: 0 8px 24px rgba(79, 149, 255, 0.18); transform: translateY(0); }
            25% { box-shadow: 0 14px 36px rgba(79, 149, 255, 0.28); transform: translateY(-1px); }
            50% { box-shadow: 0 0 40px rgba(99, 192, 255, 0.4); transform: translateY(-2px); }
            75% { box-shadow: 0 10px 30px rgba(79, 149, 255, 0.24); transform: translateY(-1px); }
        }
    </style>
</head>
<body>
    <div class="particles" aria-hidden="true"></div>
    <div class="login-container">
        <div class="login-card">
            <div class="login-logo">
                <div class="login-logo-text">CampusIQ</div>
            </div>
            
            <div class="greeting-text" id="greetingText">Good Morning ☀️</div>
            <h2 class="login-title">Welcome Back</h2>
            <p class="login-subtitle">Sign in to your account</p>
            
            {% if message %}
            <div class="success-msg">{{ message }}</div>
            {% endif %}
            {% if error %}
            <div class="error-msg">{{ error }}</div>
            {% endif %}
            
            <form id="login-form" method="post" action="/login">
                <input type="hidden" name="csrf_token" value="{{ csrf_token(request) }}">
                <input type="hidden" name="identifier_type" value="email">
                
                <div class="form-group">
                    <label for="login_as">Login As</label>
                    <select id="login_as" name="login_as" required>
                        <option value="admin" {% if selected_role == 'admin' %}selected{% endif %}>Admin</option>
                        <option value="teacher" {% if selected_role == 'teacher' %}selected{% endif %}>Teacher</option>
                        <option value="student" {% if selected_role == 'student' or not selected_role %}selected{% endif %}>Student</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label for="identifier_input">Email Address</label>
                    <input type="text" id="identifier_input" name="identifier" placeholder="Enter your email" value="{{ identifier_value or '' }}" required>
                </div>
                
                <div class="form-group">
                    <label for="login_password">Password</label>
                    <input type="password" id="login_password" name="password" placeholder="Enter your password" required>
                </div>
                
                <label class="remember-wrap">
                    <input type="checkbox" id="remember_me" name="remember_me" {% if remember_checked %}checked{% endif %}> 
                    Remember Me
                </label>
                
                <div class="role-badge" id="roleBadge" aria-live="polite"></div>
                
                <button class="login-btn" type="submit"><span class="btn-text">Sign In</span><span class="btn-loader" aria-hidden="true"></span></button>
            </form>
            
            <div class="auth-links">
                <a href="/forgot-password">Forgot Password?</a>
                <a href="/register">Create Account</a>
            </div>
            
            <a href="/" class="back-link">← Back to Home</a>
        </div>
    </div>

    <script>
        // Generate particles
        const particleContainer = document.querySelector('.particles');
        if (particleContainer) {
            const createParticle = () => {
                const dot = document.createElement('div');
                dot.className = 'particle';
                const size = 6 + Math.random() * 10;
                dot.style.width = `${size}px`;
                dot.style.height = `${size}px`;
                dot.style.left = `${Math.random() * 100}%`;
                dot.style.top = `${Math.random() * 100}%`;
                dot.style.animationDuration = `${16 + Math.random() * 10}s`;
                dot.style.animationDelay = `${Math.random() * 6}s`;
                particleContainer.appendChild(dot);
            };
            for (let i = 0; i < 20; i += 1) {
                createParticle();
            }
        }

        const roleBadge = document.getElementById('roleBadge');
        const greetingText = document.getElementById('greetingText');
        const identifierInput = document.getElementById('identifier_input');
        const loginCard = document.querySelector('.login-card');
        const loginForm = document.getElementById('login-form');
        const loginBtn = document.querySelector('.login-btn');
        const btnText = loginBtn.querySelector('.btn-text');

        const roleDefinitions = [
            { key: 'admin', label: 'Admin Portal', icon: '🛡️', className: 'admin-glow' },
            { key: 'teacher', label: 'Teacher Portal', icon: '📗', className: 'teacher-glow' },
            { key: 'student', label: 'Student Portal', icon: '🎓', className: 'student-glow' }
        ];

        function updateGreeting() {
            const hour = new Date().getHours();
            if (hour >= 5 && hour < 12) {
                greetingText.textContent = 'Good Morning ☀️';
            } else if (hour >= 12 && hour < 17) {
                greetingText.textContent = 'Good Afternoon 🌤️';
            } else if (hour >= 17 && hour < 21) {
                greetingText.textContent = 'Good Evening 🌙';
            } else {
                greetingText.textContent = 'Working Late? 🌟';
            }
        }

        function clearRoleGlow() {
            loginCard.classList.remove('admin-glow', 'teacher-glow', 'student-glow');
        }

        function setRoleBadge(role) {
            clearRoleGlow();

            if (!role) {
                roleBadge.classList.remove('visible');
                roleBadge.innerHTML = '';
                return;
            }

            loginCard.classList.add(role.className);
            roleBadge.classList.add('visible');
            roleBadge.innerHTML = `<span class="role-icon">${role.icon}</span><span>${role.label}</span>`;
        }

        function detectRoleFromEmail(value) {
            const email = value.toLowerCase();
            if (email.includes('admin')) return roleDefinitions[0];
            if (email.includes('teacher')) return roleDefinitions[1];
            if (email.includes('student')) return roleDefinitions[2];
            return null;
        }

        identifierInput.addEventListener('input', () => {
            const role = detectRoleFromEmail(identifierInput.value);
            setRoleBadge(role);
        });

        loginForm.addEventListener('submit', () => {
            loginBtn.classList.add('loading');
            btnText.textContent = 'Authenticating...';
            loginBtn.disabled = true;
        });

        updateGreeting();
    </script>
</body>
</html>
