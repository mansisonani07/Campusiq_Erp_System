{% extends "base.html" %}
{% block content %}
<section class="login-page">
    <div class="login-bg" aria-hidden="true">
        <div class="float-blob blob-a"></div>
        <div class="float-blob blob-b"></div>
        <div class="float-blob blob-c"></div>
    </div>
    <section class="panel small login-panel">
        <h2 class="login-title">Forgot Password</h2>
        {% if message %}<p class="success">{{ message }}</p>{% endif %}
        {% if error %}<p class="error">{{ error }}</p>{% endif %}
        <form method="post" action="/forgot-password" class="grid login-form">
            <input type="hidden" name="csrf_token" value="{{ csrf_token(request) }}">
            <select id="forgot_identifier_type" name="identifier_type" required>
                <option value="email">Recover via Email OTP</option>
                <option value="phone">Recover via SMS OTP</option>
            </select>
            <input type="text" id="forgot_identifier_input" name="identifier" placeholder="Email address" required>
            <button class="btn primary" type="submit">Send OTP</button>
        </form>
        <div class="auth-links">
            <a href="/login">Back to Login</a>
        </div>
    </section>
</section>
{% endblock %}
