{% extends "base.html" %}
{% block content %}
<section class="login-page">
    <div class="login-bg" aria-hidden="true">
        <div class="float-blob blob-a"></div>
        <div class="float-blob blob-b"></div>
        <div class="float-blob blob-c"></div>
    </div>
    <section class="panel login-panel auth-panel-large">
        <h2 class="login-title">Reset Password</h2>
        {% if message %}<p class="success">{{ message }}</p>{% endif %}
        {% if error %}<p class="error">{{ error }}</p>{% endif %}
        <form method="post" action="/reset-password" class="grid login-form">
            <input type="hidden" name="csrf_token" value="{{ csrf_token(request) }}">
            <input type="text" name="otp_code" placeholder="Enter OTP" minlength="6" maxlength="6" required>
            <div class="password-field">
                <input id="reset_new_password" type="password" name="new_password" placeholder="New password" required>
                <button class="password-toggle" type="button" data-toggle-target="reset_new_password" aria-label="Show password" aria-pressed="false">
                    <svg class="eye-icon eye-open" viewBox="0 0 24 24" aria-hidden="true" focusable="false"><path d="M1.5 12S5.5 5.5 12 5.5 22.5 12 22.5 12 18.5 18.5 12 18.5 1.5 12 1.5 12Z"></path><circle cx="12" cy="12" r="3.2"></circle></svg>
                    <svg class="eye-icon eye-closed" viewBox="0 0 24 24" aria-hidden="true" focusable="false"><path d="M3 3l18 18"></path><path d="M9.9 5.9A11.2 11.2 0 0 1 12 5.5c6.5 0 10.5 6.5 10.5 6.5a18.5 18.5 0 0 1-3.6 4.4"></path><path d="M6.7 6.7A19.2 19.2 0 0 0 1.5 12S5.5 18.5 12 18.5c1.7 0 3.2-.4 4.5-1.1"></path><path d="M10.6 10.6a2 2 0 0 0 2.8 2.8"></path></svg>
                </button>
            </div>
            <div class="password-field">
                <input id="reset_confirm_password" type="password" name="confirm_password" placeholder="Confirm new password" required>
                <button class="password-toggle" type="button" data-toggle-target="reset_confirm_password" aria-label="Show password" aria-pressed="false">
                    <svg class="eye-icon eye-open" viewBox="0 0 24 24" aria-hidden="true" focusable="false"><path d="M1.5 12S5.5 5.5 12 5.5 22.5 12 22.5 12 18.5 18.5 12 18.5 1.5 12 1.5 12Z"></path><circle cx="12" cy="12" r="3.2"></circle></svg>
                    <svg class="eye-icon eye-closed" viewBox="0 0 24 24" aria-hidden="true" focusable="false"><path d="M3 3l18 18"></path><path d="M9.9 5.9A11.2 11.2 0 0 1 12 5.5c6.5 0 10.5 6.5 10.5 6.5a18.5 18.5 0 0 1-3.6 4.4"></path><path d="M6.7 6.7A19.2 19.2 0 0 0 1.5 12S5.5 18.5 12 18.5c1.7 0 3.2-.4 4.5-1.1"></path><path d="M10.6 10.6a2 2 0 0 0 2.8 2.8"></path></svg>
                </button>
            </div>
            <button class="btn primary" type="submit">Update Password</button>
        </form>
        <div class="auth-links">
            <a href="/login">Back to Login</a>
        </div>
    </section>
</section>
{% endblock %}
